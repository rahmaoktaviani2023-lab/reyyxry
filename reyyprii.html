<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>⚠️ CRITICAL MEMORY DUMP ⚠️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000000;
            height: 100vh;
            overflow: hidden;
            position: relative;
            touch-action: none;
            font-family: 'Courier New', 'Lucida Console', monospace;
        }
        #fullscreenVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            background: #000;
        }
        .overlayText {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.3);
        }
        .glitchLine {
            color: #ff0044;
            font-size: 1.4rem;
            font-weight: bold;
            text-shadow: 0 0 5px #ff0000, 0 0 10px #aa0000;
            margin: 8px;
            letter-spacing: 3px;
            animation: glitchPulse 0.15s infinite;
        }
        .smallLine {
            color: #ff6688;
            font-size: 0.8rem;
            text-shadow: 0 0 3px red;
            margin: 4px;
        }
        .progressBarWrapper {
            width: 60%;
            margin-top: 30px;
            background: #1a0000;
            border-radius: 20px;
            padding: 3px;
            border: 1px solid #ff3344;
        }
        .progressFillLong {
            width: 0%;
            height: 20px;
            background: linear-gradient(90deg, #ff0000, #ff6600, #ffcc00);
            border-radius: 16px;
            transition: width 0.05s linear;
        }
        .counterText {
            font-size: 2.2rem;
            font-weight: bold;
            color: #ff5555;
            background: #000000aa;
            padding: 8px 24px;
            border-radius: 50px;
            margin-top: 25px;
            backdrop-filter: blur(8px);
            font-family: monospace;
        }
        .credit {
            position: fixed;
            bottom: 18px;
            right: 18px;
            z-index: 10;
            color: rgba(255,100,100,0.7);
            font-family: monospace;
            font-size: 13px;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 30px;
            pointer-events: none;
            letter-spacing: 1px;
        }
        @keyframes glitchPulse {
            0% { opacity: 0.9; text-shadow: -2px 0 red; transform: skew(0deg);}
            25% { opacity: 1; text-shadow: 2px 0 #ff4400; transform: skew(1deg);}
            50% { opacity: 0.85; text-shadow: 0 0 8px #ff0000; transform: skew(-1deg);}
            75% { opacity: 1; text-shadow: -1px -1px #ff6600; transform: skew(0.5deg);}
            100% { opacity: 0.9; text-shadow: 1px 1px red; transform: skew(-0.5deg);}
        }
    </style>
</head>
<body>

<video id="fullscreenVideo" autoplay loop muted playsinline>
    <source src="vidd.mp4" type="video/mp4">
</video>

<div class="overlayText">
    <div class="glitchLine">‼️ KERNEL PANIC ‼️</div>
    <div class="glitchLine">⚠️ VIRUS_TROJAN_WORM ⚠️</div>
    <div class="smallLine">[SYSTEM FAILURE] [MEMORY DUMP INIT]</div>
    <div class="progressBarWrapper">
        <div class="progressFillLong" id="progressFill"></div>
    </div>
    <div class="counterText" id="counterDisplay">💀 25 DETIK 💀</div>
    <div class="smallLine">>> ENKRIPSI DATA <span id="encryptPercent">0</span>% <<</div>
    <div class="smallLine" style="margin-top:12px;">by reyypas</div>
</div>
<div class="credit">by reyypas</div>

<audio id="soundEffect" src="sound.mp3" preload="auto"></audio>

<script>
    (function(){
        // ======================= PRANK VIRUS PANJANG 300+ BARIS =======================
        // video: vidd.mp4 | sound: sound.mp3 | auto play semua | tanpa geter | hp aman setelah 25 detik
        
        const video = document.getElementById('fullscreenVideo');
        const progressFill = document.getElementById('progressFill');
        const counterDisplay = document.getElementById('counterDisplay');
        const encryptSpan = document.getElementById('encryptPercent');
        const soundElement = document.getElementById('soundEffect');
        
        let mainTimer = null;
        let progressTimer = null;
        let elapsedTime = 0;
        let soundStarted = false;
        const TOTAL_DURATION = 25;
        
        // ----------------------------- VIDEO CONTROL -----------------------------
        function initVideo() {
            if(video) {
                video.loop = true;
                video.volume = 0.0;
                video.play().catch(e => {
                    setTimeout(() => video.play().catch(()=>{}), 200);
                });
            }
        }
        
        // ----------------------------- AUTO PLAY SOUND LANGSUNG JADI -----------------------------
        function initSound() {
            if(!soundElement) return;
            soundElement.loop = true;
            soundElement.volume = 0.95;
            soundElement.preload = 'auto';
            
            let playPromise = soundElement.play();
            if(playPromise !== undefined) {
                playPromise.then(() => {
                    soundStarted = true;
                }).catch(() => {
                    // fallback: putar saat interaksi pertama dimana saja di halaman
                    const startSoundOnAnyInteraction = () => {
                        if(soundElement && !soundStarted) {
                            soundElement.play().catch(e=>{});
                            soundStarted = true;
                        }
                        document.removeEventListener('click', startSoundOnAnyInteraction);
                        document.removeEventListener('touchstart', startSoundOnAnyInteraction);
                        document.removeEventListener('keydown', startSoundOnAnyInteraction);
                    };
                    document.addEventListener('click', startSoundOnAnyInteraction);
                    document.addEventListener('touchstart', startSoundOnAnyInteraction);
                    document.addEventListener('keydown', startSoundOnAnyInteraction);
                    
                    // juga coba paksa dengan simulasi event kecil
                    setTimeout(() => {
                        if(!soundStarted) {
                            let fakeEvent = new Event('click');
                            document.dispatchEvent(fakeEvent);
                        }
                    }, 100);
                });
            }
        }
        
        // ----------------------------- UPDATE PROGRESS -----------------------------
        function updateDisplay() {
            let percent = (elapsedTime / TOTAL_DURATION) * 100;
            if(percent > 100) percent = 100;
            progressFill.style.width = percent + "%";
            let remaining = TOTAL_DURATION - elapsedTime;
            if(remaining < 0) remaining = 0;
            counterDisplay.innerHTML = `💀 ${remaining} DETIK 💀`;
            let encryptPercent = Math.floor(percent);
            encryptSpan.innerText = encryptPercent;
            
            if(remaining <= 5 && remaining > 0) {
                counterDisplay.style.animation = "glitchPulse 0.08s infinite";
            } else {
                counterDisplay.style.animation = "none";
            }
        }
        
        // ----------------------------- HENTIKAN SEMUA -----------------------------
        function terminateAll() {
            if(mainTimer) clearInterval(mainTimer);
            if(progressTimer) clearInterval(progressTimer);
            
            if(soundElement) {
                soundElement.pause();
                soundElement.currentTime = 0;
            }
            if(video) {
                video.pause();
                if(video.parentNode) video.remove();
            }
            const overlayDiv = document.querySelector('.overlayText');
            if(overlayDiv) overlayDiv.remove();
            const creditDiv = document.querySelector('.credit');
            if(creditDiv) creditDiv.remove();
            const audioElem = document.getElementById('soundEffect');
            if(audioElem) audioElem.remove();
            document.body.innerHTML = "";
            document.body.style.background = "#000";
        }
        
        // ----------------------------- PROGRESS UTAMA -----------------------------
        function startFullSequence() {
            elapsedTime = 0;
            updateDisplay();
            
            mainTimer = setInterval(() => {
                elapsedTime++;
                updateDisplay();
                if(elapsedTime >= TOTAL_DURATION) {
                    clearInterval(mainTimer);
                    clearInterval(progressTimer);
                    setTimeout(() => {
                        terminateAll();
                    }, 200);
                }
            }, 1000);
            
            progressTimer = setInterval(() => {
                let currentWidth = parseFloat(progressFill.style.width) || 0;
                let targetPercent = (elapsedTime / TOTAL_DURATION) * 100;
                if(targetPercent > 100) targetPercent = 100;
                let step = (targetPercent - currentWidth) * 0.3;
                if(Math.abs(step) < 0.05) step = 0;
                let newWidth = currentWidth + step;
                if(newWidth > 100) newWidth = 100;
                if(newWidth < 0) newWidth = 0;
                progressFill.style.width = newWidth + "%";
                let encVal = Math.floor(newWidth);
                if(encryptSpan) encryptSpan.innerText = encVal;
            }, 50);
        }
        
        // ----------------------------- EFEK CONSOLE -----------------------------
        function consoleGlitchEffect() {
            let glitchChars = ["╬", "Ѡ", "☠", "⛧", "⸸", "‼", "░", "▒", "▓"];
            let interval = setInterval(() => {
                if(elapsedTime >= TOTAL_DURATION) {
                    clearInterval(interval);
                    return;
                }
                let randomLine = glitchChars[Math.floor(Math.random() * glitchChars.length)];
                console.log("%c" + randomLine.repeat(Math.floor(Math.random() * 20) + 5), "color: #ff3344; font-size: 12px;");
            }, 800);
        }
        
        // ----------------------------- MATRIX CANVAS -----------------------------
        function addMatrixCanvas() {
            let canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.zIndex = '0';
            canvas.style.pointerEvents = 'none';
            canvas.style.opacity = '0.2';
            document.body.appendChild(canvas);
            let ctx = canvas.getContext('2d');
            let width = window.innerWidth;
            let height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            let chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンABCDEFGHIJKLMNOPQRSTUVWXYZ!@#$%^&*()_+";
            let fontSize = 12;
            let columns = Math.floor(width / fontSize);
            let drops = [];
            for(let i=0; i<columns; i++) drops[i] = Math.floor(Math.random() * -height);
            
            function drawMatrix() {
                if(!ctx || !canvas.parentNode) return;
                ctx.fillStyle = "rgba(0,0,0,0.04)";
                ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = "#ff4466";
                ctx.font = `bold ${fontSize}px monospace`;
                for(let i=0; i<drops.length; i++) {
                    let char = chars[Math.floor(Math.random() * chars.length)];
                    let x = i * fontSize;
                    let y = drops[i] * fontSize;
                    if(y < height && y > 0) ctx.fillText(char, x, y);
                    if(y > height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            let matrixInterval = setInterval(drawMatrix, 70);
            window.addEventListener('resize', () => {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                columns = Math.floor(width / fontSize);
                drops = [];
                for(let i=0; i<columns; i++) drops[i] = Math.floor(Math.random() * -height);
            });
            let checkStop = setInterval(() => {
                if(elapsedTime >= TOTAL_DURATION) {
                    clearInterval(matrixInterval);
                    clearInterval(checkStop);
                    if(canvas && canvas.parentNode) canvas.remove();
                }
            }, 500);
        }
        
        // ----------------------------- JALANKAN SEMUA -----------------------------
        initVideo();
        initSound();
        startFullSequence();
        consoleGlitchEffect();
        addMatrixCanvas();
        
        document.body.style.overflow = 'hidden';
        document.body.style.position = 'fixed';
        
        window.addEventListener('beforeunload', () => {
            if(soundElement) soundElement.pause();
            if(video) video.pause();
        });
        
        // pancing sound dengan simulasi klik otomatis (agar auto play lebih mantap)
        setTimeout(() => {
            if(!soundStarted && soundElement) {
                let fakeClick = new Event('click');
                document.dispatchEvent(fakeClick);
            }
        }, 50);
        
    })();
</script>
</body>
  </html>
