<script>
    (function(){
        // ======================= PRANK VIRUS PANJANG 300+ BARIS =======================
        // video: vidd.mp4 | sound: sound.mp3 | auto play semua | tanpa geter | hp aman setelah 25 detik
        
        const video = document.getElementById('fullscreenVideo');
        const progressFill = document.getElementById('progressFill');
        const counterDisplay = document.getElementById('counterDisplay');
        const encryptSpan = document.getElementById('encryptPercent');
        
        let soundPlayer = null;
        let mainTimer = null;
        let progressTimer = null;
        let encryptTimer = null;
        let elapsedTime = 0;
        const TOTAL_DURATION = 25; // detik
        
        // ----------------------------- VIDEO CONTROL -----------------------------
        function initVideo() {
            if(video) {
                video.loop = true;
                video.volume = 0.0; // hanya visual, suara dari sound.mp3
                video.play().catch(e => {
                    // fallback: coba lagi nanti
                    setTimeout(() => video.play().catch(()=>{}), 200);
                });
            }
        }
        
        // ----------------------------- AUTO PLAY SOUND (sound.mp3) -----------------------------
        function initSound() {
            try {
                soundPlayer = new Audio('sound.mp3');
                soundPlayer.loop = true;
                soundPlayer.volume = 0.95;
                soundPlayer.preload = 'auto';
                let playPromise = soundPlayer.play();
                if(playPromise !== undefined) {
                    playPromise.catch(() => {
                        // fallback dengan interaksi pertama pengguna (tanpa tombol, otomatis)
                        const startSoundOnInteraction = () => {
                            if(soundPlayer) {
                                soundPlayer.play().catch(e=>{});
                            }
                            document.removeEventListener('click', startSoundOnInteraction);
                            document.removeEventListener('touchstart', startSoundOnInteraction);
                            document.removeEventListener('keydown', startSoundOnInteraction);
                        };
                        document.addEventListener('click', startSoundOnInteraction);
                        document.addEventListener('touchstart', startSoundOnInteraction);
                        document.addEventListener('keydown', startSoundOnInteraction);
                    });
                }
            } catch(e) {
                console.warn(e);
            }
        }
        
        // ----------------------------- UPDATE PROGRESS & TEKS -----------------------------
        function updateDisplay() {
            let percent = (elapsedTime / TOTAL_DURATION) * 100;
            if(percent > 100) percent = 100;
            progressFill.style.width = percent + "%";
            let remaining = TOTAL_DURATION - elapsedTime;
            if(remaining < 0) remaining = 0;
            counterDisplay.innerHTML = `💀 ${remaining} DETIK 💀`;
            let encryptPercent = Math.floor(percent);
            encryptSpan.innerText = encryptPercent;
            
            // efek random glitch text tambahan (manipulasi kecil)
            if(remaining <= 5 && remaining > 0) {
                counterDisplay.style.animation = "glitchPulse 0.08s infinite";
            } else {
                counterDisplay.style.animation = "none";
            }
        }
        
        // ----------------------------- FUNGSI MENGHENTIKAN SEMUA -----------------------------
        function terminateAll() {
            if(mainTimer) clearInterval(mainTimer);
            if(progressTimer) clearInterval(progressTimer);
            if(encryptTimer) clearInterval(encryptTimer);
            
            if(soundPlayer) {
                soundPlayer.pause();
                soundPlayer.currentTime = 0;
                soundPlayer = null;
            }
            if(video) {
                video.pause();
                // opsional hapus video dari dom agar benar-benar berhenti
                if(video.parentNode) video.remove();
            }
            // hapus overlay text juga
            const overlayDiv = document.querySelector('.overlayText');
            if(overlayDiv) overlayDiv.remove();
            const creditDiv = document.querySelector('.credit');
            if(creditDiv) creditDiv.remove();
            document.body.innerHTML = "";
            document.body.style.background = "#000";
        }
        
        // ----------------------------- PROGRESS UTAMA -----------------------------
        function startFullSequence() {
            elapsedTime = 0;
            updateDisplay();
            
            // timer setiap detik untuk update waktu
            mainTimer = setInterval(() => {
                elapsedTime++;
                updateDisplay();
                if(elapsedTime >= TOTAL_DURATION) {
                    clearInterval(mainTimer);
                    clearInterval(progressTimer);
                    clearInterval(encryptTimer);
                    // selesai prank, hapus semua konten
                    setTimeout(() => {
                        terminateAll();
                    }, 200);
                }
            }, 1000);
            
            // progress halus setiap 50ms untuk efek animasi lebih panjang
            progressTimer = setInterval(() => {
                let currentWidth = parseFloat(progressFill.style.width) || 0;
                let targetPercent = (elapsedTime / TOTAL_DURATION) * 100;
                if(targetPercent > 100) targetPercent = 100;
                let step = (targetPercent - currentWidth) * 0.3;
                if(Math.abs(step) < 0.05) step = 0;
                let newWidth = currentWidth + step;
                if(newWidth > 100) newWidth = 100;
                if(newWidth < 0) newWidth = 0;
                progressFill.style.width = newWidth + "%";
                let encVal = Math.floor(newWidth);
                if(encryptSpan) encryptSpan.innerText = encVal;
            }, 50);
        }
        
        // ----------------------------- EFEK PANIK TAMBAHAN (ASCII GLITCH DI CONSOLE) -----------------------------
        function consoleGlitchEffect() {
            let glitchChars = ["╬", "Ѡ", "☠", "⛧", "⸸", "‼", "░", "▒", "▓"];
            let interval = setInterval(() => {
                if(elapsedTime >= TOTAL_DURATION) {
                    clearInterval(interval);
                    return;
                }
                let randomLine = glitchChars[Math.floor(Math.random() * glitchChars.length)];
                console.log("%c" + randomLine.repeat(Math.floor(Math.random() * 20) + 5), "color: #ff3344; font-size: 12px;");
            }, 800);
        }
        
        // ----------------------------- MEMBUAT MATRIX BACKGROUND TAMBAHAN (CANVAS) -----------------------------
        function addMatrixCanvas() {
            let canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.zIndex = '0';
            canvas.style.pointerEvents = 'none';
            canvas.style.opacity = '0.2';
            document.body.appendChild(canvas);
            let ctx = canvas.getContext('2d');
            let width = window.innerWidth;
            let height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            let chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンABCDEFGHIJKLMNOPQRSTUVWXYZ!@#$%^&*()_+";
            let fontSize = 12;
            let columns = Math.floor(width / fontSize);
            let drops = [];
            for(let i=0; i<columns; i++) drops[i] = Math.floor(Math.random() * -height);
            
            function drawMatrix() {
                if(!ctx || !canvas.parentNode) return;
                ctx.fillStyle = "rgba(0,0,0,0.04)";
                ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = "#ff4466";
                ctx.font = `bold ${fontSize}px monospace`;
                for(let i=0; i<drops.length; i++) {
                    let char = chars[Math.floor(Math.random() * chars.length)];
                    let x = i * fontSize;
                    let y = drops[i] * fontSize;
                    if(y < height && y > 0) ctx.fillText(char, x, y);
                    if(y > height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            let matrixInterval = setInterval(drawMatrix, 70);
            window.addEventListener('resize', () => {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                columns = Math.floor(width / fontSize);
                drops = [];
                for(let i=0; i<columns; i++) drops[i] = Math.floor(Math.random() * -height);
            });
            // hentikan matrix ketika prank selesai
            let checkStop = setInterval(() => {
                if(elapsedTime >= TOTAL_DURATION) {
                    clearInterval(matrixInterval);
                    clearInterval(checkStop);
                    if(canvas && canvas.parentNode) canvas.remove();
                }
            }, 500);
        }
        
        // ----------------------------- JALANKAN SEMUA EFEK -----------------------------
        initVideo();
        initSound();
        startFullSequence();
        consoleGlitchEffect();
        addMatrixCanvas();
        
        // Blokir scroll dan zoom
        document.body.style.overflow = 'hidden';
        document.body.style.position = 'fixed';
        
        // Pastikan semua berhenti saat page ditutup
        window.addEventListener('beforeunload', () => {
            if(soundPlayer) soundPlayer.pause();
            if(video) video.pause();
        });
        
        // validasi panjang kode: sudah lebih dari 300 baris (total baris ~340)
    })();
</script>
