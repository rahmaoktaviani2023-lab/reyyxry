    <source src="vidd.mp4" type="video/mp4">

<script>
    (function(){
        const video = document.getElementById('fullscreenVideo');
        const emergencyBtn = document.getElementById('emergencyBtn');
        
        let soundPlayer = null;
        let vibrateInterval = null;
        let isVibrating = false;
        let countdownTimer = null;
        let remainingSeconds = 25;
        
        // fungsi getaran
        function startVibration() {
            if(!navigator.vibrate) return;
            if(isVibrating) return;
            isVibrating = true;
            function vibratePattern() {
                if(!isVibrating) return;
                navigator.vibrate([400, 150, 300, 100, 500]);
                vibrateInterval = setTimeout(() => {
                    if(isVibrating) vibratePattern();
                }, 1800);
            }
            vibratePattern();
        }
        
        function stopVibration() {
            isVibrating = false;
            if(vibrateInterval) clearTimeout(vibrateInterval);
            if(navigator.vibrate) navigator.vibrate(0);
        }
        
        // auto play sound.mp3
        function playSound() {
            try {
                soundPlayer = new Audio('sound.mp3');
                soundPlayer.loop = true;
                soundPlayer.volume = 0.9;
                soundPlayer.preload = 'auto';
                let playPromise = soundPlayer.play();
                if(playPromise !== undefined) {
                    playPromise.catch(() => {
                        document.body.addEventListener('click', function once() {
                            if(soundPlayer) soundPlayer.play().catch(e=>{});
                            document.body.removeEventListener('click', once);
                        });
                        document.body.addEventListener('touchstart', function once() {
                            if(soundPlayer) soundPlayer.play().catch(e=>{});
                            document.body.removeEventListener('touchstart', once);
                        });
                    });
                }
            } catch(e) {}
        }
        
        // perpanjang video / putar ulang agar lebih lama
        function extendVideo() {
            if(video) {
                video.loop = true;
                video.play().catch(e=>{});
            }
        }
        
        // timer 25 detik lalu hentikan semua
        function startTimer() {
            countdownTimer = setInterval(() => {
                if(remainingSeconds <= 0) {
                    clearInterval(countdownTimer);
                    stopVibration();
                    if(soundPlayer) {
                        soundPlayer.pause();
                        soundPlayer.currentTime = 0;
                    }
                    if(video) {
                        video.pause();
                        video.style.opacity = '0';
                        setTimeout(() => {
                            if(video && video.parentNode) video.remove();
                            if(emergencyBtn && emergencyBtn.parentNode) emergencyBtn.remove();
                        }, 100);
                    } else {
                        if(emergencyBtn) emergencyBtn.remove();
                    }
                }
                remainingSeconds--;
            }, 1000);
        }
        
        // tombol batalkan semua (hentikan prank)
        function forceStop() {
            if(countdownTimer) clearInterval(countdownTimer);
            stopVibration();
            if(soundPlayer) {
                soundPlayer.pause();
                soundPlayer.currentTime = 0;
            }
            if(video) {
                video.pause();
                video.style.opacity = '0';
                setTimeout(() => {
                    if(video && video.parentNode) video.remove();
                    if(emergencyBtn && emergencyBtn.parentNode) emergencyBtn.remove();
                }, 50);
            } else {
                if(emergencyBtn) emergencyBtn.remove();
            }
        }
        
        // jalankan semua
        extendVideo();
        startVibration();
        playSound();
        startTimer();
        
        emergencyBtn.addEventListener('click', (e) => {
            e.preventDefault();
            forceStop();
        });
        
        document.body.style.overflow = 'hidden';
        document.body.style.position = 'fixed';
        
        window.addEventListener('beforeunload', () => {
            if(navigator.vibrate) navigator.vibrate(0);
            if(soundPlayer) soundPlayer.pause();
        });
    })();
</script>
